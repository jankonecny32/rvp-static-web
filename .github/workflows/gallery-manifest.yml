name: Generate Gallery Manifest

on:
  push:
    paths:
      - 'img/rvp/**'

jobs:
  generate-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Generate thumbnails
        run: |
          dir="img/rvp/galerie"
          if [ -d "$dir" ]; then
            mkdir -p "$dir/thumbs"
            for img in "$dir"/*.{jpg,jpeg,png,gif,webp,avif}; do
              [ -f "$img" ] || continue
              thumb="$dir/thumbs/$(basename "$img")"
              if [ ! -f "$thumb" ] || [ "$img" -nt "$thumb" ]; then
                convert "$img" -auto-orient -resize "800x>" -quality 80 "$thumb"
                echo "  $(basename "$img"): $(du -k "$img" | cut -f1)KB -> $(du -k "$thumb" | cut -f1)KB"
              fi
            done
          fi

      - name: Generate gallery manifest
        shell: pwsh
        run: ./scripts/generate-gallery-manifest.ps1

      - name: Commit manifest if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add js/gallery-data.js img/rvp/galerie/thumbs/
          git diff --cached --quiet || git commit -m "chore: update gallery manifest and thumbnails"
          git push
